spring:
  application:
    name: library-service

  mvc:
    log-request-details: true

  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:190817}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        highlight_sql: false
        use_sql_comments: false
        generate_statistics: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  file:
    path: logs
  rotation:
    max-file-size: 10KB
    max-history: 14
    total-size-cap: 1GB

server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/plain,text/html,text/xml,text/css,application/javascript

library:
  scenario:
    async-delay-millis: 10000
    async:
      core-pool-size: 16
      max-pool-size: 64
      queue-capacity: 2000
      await-termination-seconds: 30
